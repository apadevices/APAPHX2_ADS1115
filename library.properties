sentence=pH and ORP/RX measurement library for APADevices PHX v2 board using ADS1115 16-bit ADC.
paragraph=Non-blocking state machine design with two-point calibration, EEPROM persistence, temperature compensation (Pasco 2001), rolling average filter, message callback for LCD/Serial, and compile-time debug system. Zero heap allocation after begin() — AVR safe. Supports AVR, ESP8266, ESP32 and STM32 (STM32duino).
